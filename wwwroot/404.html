<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA fallback: redirect 404s to index.html with the path as a query parameter
        var pathSegmentsToKeep = 1; // Keep '/MyPortfolio/' in the path

        var location = window.location;
        location.replace(
            location.protocol + '//' + location.hostname + 
            (location.port ? ':' + location.port : '') +
            location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + 
            '/?/' + 
            location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
            location.hash
        );
    </script>
</head>
<body>
</body>
</html>
